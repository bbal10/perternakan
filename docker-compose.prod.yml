services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-perternakan}
    # HAPUS bagian 'ports' di sini agar DB tidak terekspos ke publik (lebih aman)
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_perternakan
      - alqoswah_network # <--- TAMBAHKAN: Agar bisa diakses Caddy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id}
    restart: always
    expose: # <--- UBAH dari 'ports' menjadi 'expose'
      - "3000"
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET min 32 chars}
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-perternakan}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id} # <--- Pastikan ini URL publik HTTPS
      PAYLOAD_DATABASE_PUSH: ${PAYLOAD_DATABASE_PUSH:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_uploads:/app/media
    networks:
      - internal_perternakan
      - alqoswah_network # <--- TAMBAHKAN: Agar bisa diakses Caddy

volumes:
  postgres_data_prod:
  media_uploads:

networks:
  internal_perternakan:
    driver: bridge
  alqoswah_network:
    external: true
    name: alqoswah-dashboard_internal # <--- PASTIKAN nama ini sama persis dengan network di project lama
