# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production.local up -d --build
# Interpolation (${VAR}) still needs --env-file (or a .env next to this file).

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-perternakan}
    # No host ports — DB only on internal networks (safer)
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_perternakan
      - alqoswah_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id}
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET min 32 chars}
      # Host "db" = compose service name (not localhost)
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-perternakan}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id}
      # Ignored for schema in production (Payload never pushes when NODE_ENV=production).
      # Schema: prodMigrations in payload.config.ts + src/migrations/*
      PAYLOAD_DATABASE_PUSH: ${PAYLOAD_DATABASE_PUSH:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_uploads:/app/media
    networks:
      - internal_perternakan
      - alqoswah_network

volumes:
  postgres_data_prod:
  media_uploads:

networks:
  internal_perternakan:
    driver: bridge
  alqoswah_network:
    external: true
    name: alqoswah-dashboard_internal # <--- PASTIKAN nama ini sama persis dengan network di project lama
