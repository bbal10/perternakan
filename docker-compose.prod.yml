# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Required in env file:
#   POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   PAYLOAD_SECRET (>= 32 chars)
#   NEXT_PUBLIC_SERVER_URL (public HTTPS URL, no trailing slash)
#
# DATABASE_URI is built with a UNIQUE hostname (perternakan-db) so the app
# never resolves another project's service named "db" on the shared Caddy network.
# That shared-network DNS clash is a common cause of "password authentication failed".

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-perternakan}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB stays on the private project network only — do NOT attach to the
    # shared Caddy network, or hostname resolution can hit the wrong Postgres.
    networks:
      internal_perternakan:
        aliases:
          - perternakan-db

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id}
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET min 32 chars}
      DATABASE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@perternakan-db:5432/${POSTGRES_DB:-perternakan}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://perternakan.alqashwa.co.id}
      PAYLOAD_DATABASE_PUSH: ${PAYLOAD_DATABASE_PUSH:-false}
      PAYLOAD_DEBUG: ${PAYLOAD_DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_uploads:/app/media
    networks:
      - internal_perternakan
      - alqoswah_network

volumes:
  postgres_data_prod:
  media_uploads:

networks:
  internal_perternakan:
    driver: bridge
  alqoswah_network:
    external: true
    name: alqoswah-dashboard_internal
